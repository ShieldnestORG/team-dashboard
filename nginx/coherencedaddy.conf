# ── Coherence Daddy Frontend Subdomains ────────────────────────────────────
# All subdomains proxy to the Next.js frontend container on port 3000.
# The Next.js middleware handles subdomain-specific routing internally.
#
# Subdomains:
#   coherencedaddy.com / www           → landing page
#   freetools.coherencedaddy.com       → 523+ free tools
#   directory.coherencedaddy.com       → project directory (532+ companies)
#   token.coherencedaddy.com           → daddy token migration
#   law.coherencedaddy.com             → coherence law
#   optimize-me.coherencedaddy.com     → optimize me app
#   affiliates.coherencedaddy.com      → affiliate marketer portal
#
# SSL: Managed by Certbot (Let's Encrypt). Run after DNS propagates:
#   sudo certbot --nginx -d coherencedaddy.com -d www.coherencedaddy.com \
#     -d freetools.coherencedaddy.com -d directory.coherencedaddy.com \
#     -d token.coherencedaddy.com -d law.coherencedaddy.com \
#     -d optimize-me.coherencedaddy.com -d affiliates.coherencedaddy.com

server {
    server_name
        coherencedaddy.com
        www.coherencedaddy.com
        freetools.coherencedaddy.com
        directory.coherencedaddy.com
        token.coherencedaddy.com
        law.coherencedaddy.com
        optimize-me.coherencedaddy.com
        affiliates.coherencedaddy.com;

    client_max_body_size 20M;

    # Static assets — long cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_set_header Host $host;
    }

    # Public assets (images, favicons, llms.txt, etc.)
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|css|js|txt|json|xml|webmanifest)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800";
        proxy_set_header Host $host;
    }

    # Everything else
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_http_version 1.1;
        proxy_buffering off;
    }

    # Certbot will add SSL directives below this line
    listen 80;
    listen [::]:80;
}
